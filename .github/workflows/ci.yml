name: CI Lint & Validation

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate-client:
    name: Validate Client (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci --prefer-offline --no-audit

      - name: Verify Client Lockfile
        run: |
          cd client
          git diff --exit-code package-lock.json

      - name: Lint Client
        run: |
          cd client
          npm run lint --if-present

      - name: Build Client Check
        run: |
          cd client
          npm run build

  validate-server:
    name: Validate Server (Express/Node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install Server Dependencies
        run: |
          cd server
          npm ci --prefer-offline --no-audit

      - name: Verify Server Lockfile
        run: |
          cd server
          git diff --exit-code package-lock.json

      - name: Verify Server Syntax
        run: |
          cd server
          node --check server.js
