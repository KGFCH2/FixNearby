name: Mark Stale Issues

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 14
          days-before-issue-close: 7
          days-before-pr-stale: 7
          days-before-pr-close: 3
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: "This issue has been marked as stale due to inactivity."
          stale-pr-message: "This pull request has been marked as stale due to inactivity."
          close-issue-message: "Closing this issue due to inactivity."
          close-pr-message: "Closing this pull request due to inactivity."
          exempt-issue-labels: "in-progress,important"